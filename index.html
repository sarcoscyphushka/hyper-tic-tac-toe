<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Гипер-крестики-нолики - Онлайн</title>
    <style>
        * { user-select: none; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #1e3c72, #2a5298); min-height: 100vh; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; }
        .container { max-width: 900px; width: 100%; }
        .panel { background: white; border-radius: 20px; padding: 30px; text-align: center; margin-bottom: 20px; }
        .panel input { padding: 12px; font-size: 1.1em; width: 250px; text-align: center; border: 2px solid #ddd; border-radius: 10px; margin: 10px; }
        .panel button { padding: 12px 25px; font-size: 1.1em; background: #667eea; color: white; border: none; border-radius: 10px; cursor: pointer; margin: 5px; }
        .game-box { background: white; border-radius: 20px; padding: 20px; display: none; }
        .room-info { background: #4CAF50; color: white; padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 15px; word-break: break-all; }
        .status { background: #f0f0f0; padding: 12px; border-radius: 12px; text-align: center; font-size: 1.2em; font-weight: bold; margin-bottom: 15px; }
        .scores { display: flex; gap: 15px; margin-bottom: 20px; }
        .score { flex: 1; text-align: center; padding: 10px; border-radius: 12px; font-weight: bold; }
        .score-x { background: #E3F2FD; color: #1976D2; }
        .score-o { background: #FFEBEE; color: #D32F2F; }
        .score span:first-child { font-size: 1.8em; display: block; }
        .score span:last-child { font-size: 2em; }
        .big-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; background: #333; padding: 8px; border-radius: 12px; }
        .big-cell { background: white; border-radius: 8px; padding: 6px; position: relative; aspect-ratio: 1; }
        .big-cell.highlight { background: #c8e6c9; box-shadow: 0 0 0 2px #2e7d32; }
        .big-cell.won::after { content: attr(data-winner); position: absolute; top: 50%; left: 50%; font-size: 3.5em; font-weight: bold; transform: translate(-50%, -50%); opacity: 0.3; pointer-events: none; }
        .small-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; background: #ddd; padding: 3px; border-radius: 5px; height: 100%; }
        .cell { background: white; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 1.2em; font-weight: bold; border-radius: 4px; cursor: pointer; transition: 0.1s; }
        .cell.taken { cursor: not-allowed; opacity: 0.6; }
        .cell.x { color: #2196F3; }
        .cell.o { color: #F44336; }
        .cell:hover:not(.taken) { background: #e0e0e0; transform: scale(0.95); }
        button { margin-top: 20px; width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 30px; font-size: 1.1em; cursor: pointer; }
        .turn-hint { text-align: center; margin-top: 10px; font-size: 0.9em; color: #666; }
        @media (max-width: 550px) { .game-box { padding: 12px; } .cell { font-size: 0.8em; } }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
<div class="container">
    <div id="connectionPanel" class="panel">
        <h2>🎮 Гипер-крестики-нолики Онлайн</h2>
        <p style="color: #666;">Играйте с другом по интернету</p>
        <button id="createBtn">✨ Создать игру (Вы X)</button>
        <div style="margin: 20px 0">или</div>
        <input type="text" id="peerIdInput" placeholder="Введите ID соперника">
        <button id="connectBtn">🔗 Подключиться (Вы O)</button>
        <div style="margin-top: 20px; font-size: 0.8em; color: #999;">После создания игры отправьте ID другу</div>
    </div>
    
    <div id="gameBox" class="game-box">
        <div id="roomInfo" class="room-info"></div>
        <div class="scores">
            <div class="score score-x"><span>❌ X</span><span id="scoreX">0</span></div>
            <div class="score score-o"><span>⭕ O</span><span id="scoreO">0</span></div>
        </div>
        <div class="status" id="statusMsg">Подключение...</div>
        <div class="big-board" id="bigBoard"></div>
        <div class="turn-hint" id="turnHint"></div>
        <button id="resetBtn">🔄 Новая игра</button>
    </div>
</div>

<script>
    let peer = null;
    let conn = null;
    let myId = null;
    let isHost = false;
    let localPlayer = null;
    
    // Игровое состояние
    let smallGrid = Array(9).fill().map(() => Array(9).fill(null));
    let bigWinner = Array(9).fill(null);
    let bigLocked = Array(9).fill(false);
    let scores = [0, 0];
    let currentPlayer = 0;
    let nextBig = null;
    let gameWinner = null;
    
    const winLines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    const gridNames = ['ЮЗ', 'Ю', 'ЮВ', 'З', 'Ц', 'В', 'СЗ', 'С', 'СВ'];
    
    function sendGameState() {
        if (!conn || conn.open === false) return;
        conn.send({
            type: 'state',
            data: {
                smallGrid, bigLocked, currentPlayer, nextBig, gameWinner
            }
        });
    }
    
    function checkAndSetSmallWin(bigIdx) {
        if (bigLocked[bigIdx]) return bigWinner[bigIdx];
        const grid = smallGrid[bigIdx];
        for (let line of winLines) {
            const [a,b,c] = line;
            if (grid[a] && grid[a] === grid[b] && grid[a] === grid[c]) {
                bigWinner[bigIdx] = grid[a];
                bigLocked[bigIdx] = true;
                if (grid[a] === 'X') scores[0]++;
                else scores[1]++;
                return grid[a];
            }
        }
        return null;
    }
    
    function updateScoresAndWinners() {
        for (let i = 0; i < 9; i++) if (!bigLocked[i]) checkAndSetSmallWin(i);
        if (scores[0] >= 5) gameWinner = 'X';
        else if (scores[1] >= 5) gameWinner = 'O';
        if (!gameWinner) {
            for (let line of winLines) {
                const [a,b,c] = line;
                if (bigWinner[a] && bigWinner[a] === bigWinner[b] && bigWinner[a] === bigWinner[c]) {
                    gameWinner = bigWinner[a];
                    break;
                }
            }
        }
    }
    
    function makeMove(bigIdx, smallIdx) {
        if (gameWinner) { alert(`Игра окончена! Победил ${gameWinner}`); return false; }
        if (!localPlayer) return false;
        const isMyTurn = (localPlayer === 'X' && currentPlayer === 0) || (localPlayer === 'O' && currentPlayer === 1);
        if (!isMyTurn) { alert("Сейчас не ваш ход!"); return false; }
        if (nextBig !== null && bigIdx !== nextBig) { alert(`Сейчас можно ходить только в квадрат ${gridNames[nextBig]}`); return false; }
        if (smallGrid[bigIdx][smallIdx] !== null) { alert("Клетка занята!"); return false; }
        
        const mark = currentPlayer === 0 ? 'X' : 'O';
        smallGrid[bigIdx][smallIdx] = mark;
        checkAndSetSmallWin(bigIdx);
        updateScoresAndWinners();
        nextBig = smallIdx;
        currentPlayer = 1 - currentPlayer;
        
        sendGameState();
        render();
        return true;
    }
    
    function loadRemoteState(state) {
        if (!state) return;
        smallGrid = state.smallGrid;
        bigLocked = state.bigLocked;
        currentPlayer = state.currentPlayer;
        nextBig = state.nextBig;
        gameWinner = state.gameWinner;
        
        // Пересчитываем bigWinner и scores
        bigWinner = Array(9).fill(null);
        scores = [0, 0];
        for (let i = 0; i < 9; i++) {
            if (bigLocked[i]) {
                const grid = smallGrid[i];
                for (let line of winLines) {
                    const [a,b,c] = line;
                    if (grid[a] && grid[a] === grid[b] && grid[a] === grid[c]) {
                        bigWinner[i] = grid[a];
                        if (grid[a] === 'X') scores[0]++;
                        else scores[1]++;
                        break;
                    }
                }
            }
        }
        render();
    }
    
    function render() {
        const boardDiv = document.getElementById('bigBoard');
        if (!boardDiv) return;
        boardDiv.innerHTML = '';
        const isMyTurn = localPlayer && ((localPlayer === 'X' && currentPlayer === 0) || (localPlayer === 'O' && currentPlayer === 1));
        
        for (let big = 0; big < 9; big++) {
            const bigCell = document.createElement('div');
            bigCell.className = 'big-cell';
            if (bigWinner[big]) { bigCell.classList.add('won'); bigCell.setAttribute('data-winner', bigWinner[big]); }
            if (!gameWinner && nextBig !== null && nextBig === big && isMyTurn) bigCell.classList.add('highlight');
            
            const smallDiv = document.createElement('div'); smallDiv.className = 'small-board';
            for (let small = 0; small < 9; small++) {
                const cell = document.createElement('div'); cell.className = 'cell';
                const val = smallGrid[big] ? smallGrid[big][small] : null;
                if (val) {
                    cell.classList.add('taken', val === 'X' ? 'x' : 'o');
                    cell.textContent = val;
                } else {
                    cell.textContent = '';
                    let canClick = false;
                    if (!gameWinner && isMyTurn) {
                        if (nextBig === null) canClick = true;
                        else if (big === nextBig) canClick = true;
                    }
                    if (canClick) cell.onclick = (function(b, s) { return () => makeMove(b, s); })(big, small);
                }
                smallDiv.appendChild(cell);
            }
            bigCell.appendChild(smallDiv);
            boardDiv.appendChild(bigCell);
        }
        
        document.getElementById('scoreX').textContent = scores[0];
        document.getElementById('scoreO').textContent = scores[1];
        
        const statusDiv = document.getElementById('statusMsg');
        if (gameWinner) statusDiv.innerHTML = `🏆 ПОБЕДИЛ ${gameWinner} 🏆`;
        else if (!localPlayer) statusDiv.innerHTML = `Ожидание подключения...`;
        else if (isMyTurn) {
            if (nextBig === null) statusDiv.innerHTML = `🎯 Ваш ход (${localPlayer}) — ЛЮБОЙ квадрат`;
            else statusDiv.innerHTML = `🎯 Ваш ход (${localPlayer}) — ходите в ЗЕЛЁНЫЙ квадрат (${gridNames[nextBig]})`;
        } else statusDiv.innerHTML = `⏳ Ход соперника... Ждите`;
        
        const hintDiv = document.getElementById('turnHint');
        if (!gameWinner && localPlayer && nextBig !== null) hintDiv.innerHTML = `📌 Следующий квадрат: ${gridNames[nextBig]}`;
        else hintDiv.innerHTML = '';
    }
    
    function resetGame() {
        smallGrid = Array(9).fill().map(() => Array(9).fill(null));
        bigWinner = Array(9).fill(null);
        bigLocked = Array(9).fill(false);
        scores = [0, 0];
        currentPlayer = 0;
        nextBig = null;
        gameWinner = null;
        if (conn && conn.open) sendGameState();
        render();
    }
    
    function createGame() {
        isHost = true;
        localPlayer = 'X';
        document.getElementById('connectionPanel').style.display = 'none';
        document.getElementById('gameBox').style.display = 'block';
        document.getElementById('statusMsg').innerHTML = 'Создание комнаты...';
        
        // Используем надежный сервер PeerJS
        peer = new Peer(undefined, {
            host: '0.peerjs.com',
            port: 443,
            path: '/',
            secure: true
        });
        
        peer.on('open', (id) => {
            myId = id;
            document.getElementById('roomInfo').innerHTML = `🔑 Ваш ID: <strong style="font-size:1.3em">${id}</strong><br><small>Отправьте его другу для подключения</small>`;
            document.getElementById('statusMsg').innerHTML = 'Ожидание подключения...';
            render();
        });
        
        peer.on('connection', (connection) => {
            conn = connection;
            conn.on('open', () => {
                document.getElementById('statusMsg').innerHTML = 'Соединение установлено!';
                sendGameState();
                render();
            });
            conn.on('data', (data) => {
                if (data.type === 'state') loadRemoteState(data.data);
            });
        });
        
        peer.on('error', (err) => {
            console.error('Peer error:', err);
            document.getElementById('statusMsg').innerHTML = 'Ошибка подключения. Попробуйте обновить страницу.';
            alert('Не удалось создать комнату. Возможно, сервер PeerJS временно недоступен. Попробуйте через 5 минут.');
        });
    }
    
    function connectToPeer() {
        const targetId = document.getElementById('peerIdInput').value.trim();
        if (!targetId) { alert('Введите ID'); return; }
        
        localPlayer = 'O';
        document.getElementById('connectionPanel').style.display = 'none';
        document.getElementById('gameBox').style.display = 'block';
        document.getElementById('roomInfo').innerHTML = `🔗 Подключение к ${targetId}...`;
        document.getElementById('statusMsg').innerHTML = 'Подключение...';
        
        peer = new Peer(undefined, {
            host: '0.peerjs.com',
            port: 443,
            path: '/',
            secure: true
        });
        
        peer.on('open', () => {
            conn = peer.connect(targetId);
            conn.on('open', () => {
                document.getElementById('roomInfo').innerHTML = `🔗 Подключено к ${targetId}`;
                document.getElementById('statusMsg').innerHTML = 'Соединение установлено!';
                render();
            });
            conn.on('data', (data) => {
                if (data.type === 'state') loadRemoteState(data.data);
            });
            conn.on('error', (err) => {
                console.error(err);
                document.getElementById('statusMsg').innerHTML = 'Ошибка соединения';
                alert('Не удалось подключиться. Проверьте ID и попробуйте снова.');
            });
        });
        
        peer.on('error', (err) => {
            console.error(err);
            document.getElementById('statusMsg').innerHTML = 'Ошибка подключения';
            alert('Ошибка подключения к серверу. Попробуйте обновить страницу.');
        });
    }
    
    document.getElementById('createBtn').onclick = createGame;
    document.getElementById('connectBtn').onclick = connectToPeer;
    document.getElementById('resetBtn').onclick = resetGame;
</script>
</body>
</html>
