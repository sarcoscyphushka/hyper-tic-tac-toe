<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Гипер-крестики-нолики — Яндекс.Диск (финал)</title>
    <style>
        * { user-select: none; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #1e3c72, #2a5298); min-height: 100vh; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; }
        .container { max-width: 900px; width: 100%; }
        .game-box { background: white; border-radius: 20px; padding: 20px; }
        .status { background: #f0f0f0; padding: 12px; border-radius: 12px; text-align: center; font-size: 1.2em; font-weight: bold; margin-bottom: 15px; }
        .scores { display: flex; gap: 15px; margin-bottom: 20px; }
        .score { flex: 1; text-align: center; padding: 10px; border-radius: 12px; font-weight: bold; }
        .score-x { background: #E3F2FD; color: #1976D2; }
        .score-o { background: #FFEBEE; color: #D32F2F; }
        .score span:first-child { font-size: 1.8em; display: block; }
        .score span:last-child { font-size: 2em; }
        .big-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; background: #333; padding: 8px; border-radius: 12px; }
        .big-cell { background: white; border-radius: 8px; padding: 6px; position: relative; aspect-ratio: 1; }
        .big-cell.highlight { background: #c8e6c9; box-shadow: 0 0 0 2px #2e7d32; }
        .big-cell.won::after { content: attr(data-winner); position: absolute; top: 50%; left: 50%; font-size: 3.5em; font-weight: bold; transform: translate(-50%, -50%); opacity: 0.3; pointer-events: none; }
        .small-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; background: #ddd; padding: 3px; border-radius: 5px; height: 100%; }
        .cell { background: white; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 1.2em; font-weight: bold; border-radius: 4px; cursor: pointer; transition: 0.1s; }
        .cell.taken { cursor: not-allowed; opacity: 0.6; }
        .cell.x { color: #2196F3; }
        .cell.o { color: #F44336; }
        .cell:hover:not(.taken) { background: #e0e0e0; transform: scale(0.95); }
        button { margin-top: 20px; width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 30px; font-size: 1.1em; cursor: pointer; }
        .turn-hint { text-align: center; margin-top: 10px; font-size: 0.9em; color: #666; }
        .sync-status { margin-top: 10px; font-size: 0.8em; text-align: center; }
        .player-select { display: flex; gap: 10px; margin: 10px 0; }
        .player-btn { flex: 1; margin: 0 !important; }
        .success { color: #4CAF50; }
        .error { color: #F44336; }
        .warning { color: #FF9800; }
    </style>
</head>
<body>
<div class="container">
    <div class="game-box">
        <div class="status" id="statusMsg">Загрузка...</div>
        <div class="scores">
            <div class="score score-x"><span>❌ X</span><span id="scoreX">0</span></div>
            <div class="score score-o"><span>⭕ O</span><span id="scoreO">0</span></div>
        </div>
        <div class="big-board" id="bigBoard"></div>
        <div class="turn-hint" id="turnHint"></div>
        <div class="player-select">
            <button id="chooseX" class="player-btn">❌ Играть за X</button>
            <button id="chooseO" class="player-btn">⭕ Играть за O</button>
        </div>
        <button id="resetBtn">🔄 Новая игра</button>
        <div class="sync-status" id="syncStatus"></div>
    </div>
</div>

<script>
    // ⚠️ ВСТАВЬТЕ ВАШ НОВЫЙ ТОКЕН СЮДА (полученный после повторного разрешения)
    const YANDEX_TOKEN = 'y0__wgBEOu3td4GGPWjQyD7gvjtFzC4vpj5B9l7uBtcfVML33WVovVtXmi9J5VB';
    const FILE_NAME = 'hyper_tic_state.json';
    
    // Игровое состояние
    let gameState = {
        smallGrid: Array(9).fill().map(() => Array(9).fill(null)),
        bigWinner: Array(9).fill(null),
        bigLocked: Array(9).fill(false),
        scores: [0, 0],
        currentPlayer: 0,
        nextBig: null,
        gameWinner: null,
        lastUpdate: 0
    };
    
    let localPlayer = null;
    let pollInterval = null;
    let isSaving = false;
    let isLoading = false;
    let lastSavedState = '';
    
    const winLines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    const gridNames = ['ЮЗ', 'Ю', 'ЮВ', 'З', 'Ц', 'В', 'СЗ', 'С', 'СВ'];
    
    // ========== РАБОТА С ЯНДЕКС ДИСК ==========
    async function ensureAppFolder() {
        try {
            const response = await fetch('https://cloud-api.yandex.net/v1/disk/resources?path=app:/', {
                method: 'GET',
                headers: { 'Authorization': `OAuth ${YANDEX_TOKEN}` }
            });
            
            if (response.status === 404) {
                const create = await fetch('https://cloud-api.yandex.net/v1/disk/resources?path=app:/', {
                    method: 'PUT',
                    headers: { 'Authorization': `OAuth ${YANDEX_TOKEN}` }
                });
                return create.ok;
            }
            return response.ok;
        } catch (e) {
            console.error('Ошибка проверки папки:', e);
            return false;
        }
    }
    
    async function uploadToYandexDisk(data) {
        if (isSaving) return false;
        if (!YANDEX_TOKEN || YANDEX_TOKEN === 'ВАШ_НОВЫЙ_ТОКЕН') {
            document.getElementById('syncStatus').innerHTML = '⚠️ Токен не настроен';
            document.getElementById('syncStatus').className = 'warning';
            return false;
        }
        
        isSaving = true;
        try {
            await ensureAppFolder();
            
            const getUploadUrl = await fetch(`https://cloud-api.yandex.net/v1/disk/resources/upload?path=app:/${FILE_NAME}&overwrite=true`, {
                method: 'GET',
                headers: { 'Authorization': `OAuth ${YANDEX_TOKEN}` }
            });
            
            if (!getUploadUrl.ok) throw new Error('Ошибка получения URL');
            
            const uploadData = await getUploadUrl.json();
            const uploadResponse = await fetch(uploadData.href, {
                method: 'PUT',
                body: JSON.stringify(data),
                headers: { 'Content-Type': 'application/json' }
            });
            
            if (uploadResponse.ok) {
                document.getElementById('syncStatus').innerHTML = '✓ Сохранено';
                document.getElementById('syncStatus').className = 'success';
                setTimeout(() => {
                    if (document.getElementById('syncStatus').innerHTML === '✓ Сохранено')
                        document.getElementById('syncStatus').innerHTML = '';
                }, 1500);
                return true;
            }
        } catch (error) {
            console.error('Ошибка сохранения:', error);
            document.getElementById('syncStatus').innerHTML = '⚠️ Ошибка сохранения';
            document.getElementById('syncStatus').className = 'error';
        } finally {
            isSaving = false;
        }
        return false;
    }
    
    async function downloadFromYandexDisk() {
        if (isLoading) return null;
        if (!YANDEX_TOKEN || YANDEX_TOKEN === 'ВАШ_НОВЫЙ_ТОКЕН') {
            return null;
        }
        
        isLoading = true;
        try {
            const response = await fetch(`https://cloud-api.yandex.net/v1/disk/resources/download?path=app:/${FILE_NAME}`, {
                method: 'GET',
                headers: { 'Authorization': `OAuth ${YANDEX_TOKEN}` }
            });
            
            if (response.status === 404) return null;
            if (!response.ok) throw new Error('Ошибка получения ссылки');
            
            const data = await response.json();
            const downloadResponse = await fetch(data.href);
            
            if (downloadResponse.ok) {
                return await downloadResponse.json();
            }
        } catch (error) {
            console.error('Ошибка загрузки:', error);
        } finally {
            isLoading = false;
        }
        return null;
    }
    
    // ========== ИГРОВАЯ ЛОГИКА ==========
    function checkAndSetWin(bigIdx) {
        if (gameState.bigLocked[bigIdx]) return gameState.bigWinner[bigIdx];
        const grid = gameState.smallGrid[bigIdx];
        for (let line of winLines) {
            const [a,b,c] = line;
            if (grid[a] && grid[a] === grid[b] && grid[a] === grid[c]) {
                gameState.bigWinner[bigIdx] = grid[a];
                gameState.bigLocked[bigIdx] = true;
                if (grid[a] === 'X') gameState.scores[0]++;
                else gameState.scores[1]++;
                return grid[a];
            }
        }
        return null;
    }
    
    function updateGame() {
        for (let i = 0; i < 9; i++) if (!gameState.bigLocked[i]) checkAndSetWin(i);
        
        gameState.gameWinner = null;
        if (gameState.scores[0] >= 5) gameState.gameWinner = 'X';
        else if (gameState.scores[1] >= 5) gameState.gameWinner = 'O';
        
        if (!gameState.gameWinner) {
            for (let line of winLines) {
                const [a,b,c] = line;
                if (gameState.bigWinner[a] && gameState.bigWinner[a] === gameState.bigWinner[b] && gameState.bigWinner[a] === gameState.bigWinner[c]) {
                    gameState.gameWinner = gameState.bigWinner[a];
                    break;
                }
            }
        }
    }
    
    async function makeMove(bigIdx, smallIdx) {
        if (gameState.gameWinner) { alert(`Игра окончена! Победил ${gameState.gameWinner}`); return; }
        if (!localPlayer) { alert("Сначала выберите X или O"); return; }
        
        const myTurn = (localPlayer === 'X' && gameState.currentPlayer === 0) || (localPlayer === 'O' && gameState.currentPlayer === 1);
        if (!myTurn) { alert("Сейчас не ваш ход"); return; }
        if (gameState.nextBig !== null && bigIdx !== gameState.nextBig) { alert(`Ходите в квадрат ${gridNames[gameState.nextBig]}`); return; }
        if (gameState.smallGrid[bigIdx][smallIdx] !== null) { alert("Клетка занята"); return; }
        
        gameState.smallGrid[bigIdx][smallIdx] = localPlayer;
        checkAndSetWin(bigIdx);
        updateGame();
        gameState.nextBig = smallIdx;
        gameState.currentPlayer = 1 - gameState.currentPlayer;
        gameState.lastUpdate = Date.now();
        
        render();
        await uploadToYandexDisk(gameState);
    }
    
    async function loadRemoteState() {
        const remoteState = await downloadFromYandexDisk();
        if (remoteState && remoteState.lastUpdate > gameState.lastUpdate) {
            // Проверяем, не затираем ли мы свой только что сделанный ход
            const timeDiff = Date.now() - remoteState.lastUpdate;
            if (timeDiff < 500 && remoteState.lastMoveBy === localPlayer) {
                // Своё же сохранение — игнорируем
                return;
            }
            gameState = remoteState;
            render();
        }
    }
    
    function render() {
        const boardDiv = document.getElementById('bigBoard');
        boardDiv.innerHTML = '';
        const myTurn = localPlayer && ((localPlayer === 'X' && gameState.currentPlayer === 0) || (localPlayer === 'O' && gameState.currentPlayer === 1));
        
        for (let big = 0; big < 9; big++) {
            const bigDiv = document.createElement('div');
            bigDiv.className = 'big-cell';
            if (gameState.bigWinner[big]) {
                bigDiv.classList.add('won');
                bigDiv.setAttribute('data-winner', gameState.bigWinner[big]);
            }
            if (!gameState.gameWinner && gameState.nextBig !== null && gameState.nextBig === big && myTurn) {
                bigDiv.classList.add('highlight');
            }
            
            const smallDiv = document.createElement('div');
            smallDiv.className = 'small-board';
            for (let small = 0; small < 9; small++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                const val = gameState.smallGrid[big]?.[small];
                if (val) {
                    cell.classList.add('taken', val === 'X' ? 'x' : 'o');
                    cell.textContent = val;
                } else {
                    cell.textContent = '';
                    if (!gameState.gameWinner && myTurn && (gameState.nextBig === null || big === gameState.nextBig)) {
                        cell.onclick = (function(b, s) { return function() { makeMove(b, s); }; })(big, small);
                    }
                }
                smallDiv.appendChild(cell);
            }
            bigDiv.appendChild(smallDiv);
            boardDiv.appendChild(bigDiv);
        }
        
        document.getElementById('scoreX').textContent = gameState.scores[0];
        document.getElementById('scoreO').textContent = gameState.scores[1];
        
        const statusDiv = document.getElementById('statusMsg');
        if (gameState.gameWinner) {
            statusDiv.innerHTML = `🏆 ПОБЕДИЛ ${gameState.gameWinner}`;
        } else if (!localPlayer) {
            statusDiv.innerHTML = 'Выберите X или O';
        } else if (myTurn) {
            if (gameState.nextBig === null) {
                statusDiv.innerHTML = `🎯 Ваш ход (${localPlayer}) — ЛЮБОЙ квадрат`;
            } else {
                statusDiv.innerHTML = `🎯 Ваш ход (${localPlayer}) — зелёный квадрат ${gridNames[gameState.nextBig]}`;
            }
        } else {
            statusDiv.innerHTML = `⏳ Ход соперника... (${gameState.currentPlayer === 0 ? 'X' : 'O'})`;
        }
        
        const hintDiv = document.getElementById('turnHint');
        hintDiv.innerHTML = (!gameState.gameWinner && localPlayer && gameState.nextBig !== null) 
            ? `📌 Следующий квадрат: ${gridNames[gameState.nextBig]}` : '';
    }
    
    async function resetGame() {
        gameState = {
            smallGrid: Array(9).fill().map(() => Array(9).fill(null)),
            bigWinner: Array(9).fill(null),
            bigLocked: Array(9).fill(false),
            scores: [0, 0],
            currentPlayer: 0,
            nextBig: null,
            gameWinner: null,
            lastUpdate: Date.now()
        };
        render();
        await uploadToYandexDisk(gameState);
    }
    
    function setPlayer(player) {
        localPlayer = player;
        render();
    }
    
    function startPolling() {
        if (pollInterval) clearInterval(pollInterval);
        pollInterval = setInterval(async () => {
            await loadRemoteState();
        }, 2000); // проверяем каждые 2 секунды
    }
    
    async function init() {
        startPolling();
        
        if (!YANDEX_TOKEN || YANDEX_TOKEN === 'ВАШ_НОВЫЙ_ТОКЕН') {
            document.getElementById('syncStatus').innerHTML = '⚠️ Вставьте токен Яндекс.Диска в код';
            document.getElementById('syncStatus').className = 'warning';
        } else {
            const remoteState = await downloadFromYandexDisk();
            if (remoteState) {
                gameState = remoteState;
            }
            document.getElementById('syncStatus').innerHTML = '✓ Синхронизация через Яндекс.Диск';
            document.getElementById('syncStatus').className = 'success';
        }
        render();
    }
    
    document.getElementById('chooseX').onclick = () => setPlayer('X');
    document.getElementById('chooseO').onclick = () => setPlayer('O');
    document.getElementById('resetBtn').onclick = resetGame;
    
    init();
</script>
</body>
</html>
