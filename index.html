<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Гипер-крестики-нолики — синхронизация через Google Диск</title>
    <style>
        * { user-select: none; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #1e3c72, #2a5298); min-height: 100vh; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; }
        .container { max-width: 900px; width: 100%; }
        .panel { background: white; border-radius: 20px; padding: 30px; text-align: center; margin-bottom: 20px; }
        .panel button { padding: 12px 25px; font-size: 1.1em; background: #667eea; color: white; border: none; border-radius: 10px; cursor: pointer; margin: 5px; }
        .game-box { background: white; border-radius: 20px; padding: 20px; display: none; }
        .status { background: #f0f0f0; padding: 12px; border-radius: 12px; text-align: center; font-size: 1.2em; font-weight: bold; margin-bottom: 15px; }
        .scores { display: flex; gap: 15px; margin-bottom: 20px; }
        .score { flex: 1; text-align: center; padding: 10px; border-radius: 12px; font-weight: bold; }
        .score-x { background: #E3F2FD; color: #1976D2; }
        .score-o { background: #FFEBEE; color: #D32F2F; }
        .score span:first-child { font-size: 1.8em; display: block; }
        .score span:last-child { font-size: 2em; }
        .big-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; background: #333; padding: 8px; border-radius: 12px; }
        .big-cell { background: white; border-radius: 8px; padding: 6px; position: relative; aspect-ratio: 1; }
        .big-cell.highlight { background: #c8e6c9; box-shadow: 0 0 0 2px #2e7d32; }
        .big-cell.won::after { content: attr(data-winner); position: absolute; top: 50%; left: 50%; font-size: 3.5em; font-weight: bold; transform: translate(-50%, -50%); opacity: 0.3; pointer-events: none; }
        .small-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; background: #ddd; padding: 3px; border-radius: 5px; height: 100%; }
        .cell { background: white; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 1.2em; font-weight: bold; border-radius: 4px; cursor: pointer; transition: 0.1s; }
        .cell.taken { cursor: not-allowed; opacity: 0.6; }
        .cell.x { color: #2196F3; }
        .cell.o { color: #F44336; }
        .cell:hover:not(.taken) { background: #e0e0e0; transform: scale(0.95); }
        button { margin-top: 20px; width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 30px; font-size: 1.1em; cursor: pointer; }
        .turn-hint { text-align: center; margin-top: 10px; font-size: 0.9em; color: #666; }
        .drive-status { margin-top: 10px; font-size: 0.8em; color: #4CAF50; }
    </style>
    <!-- Google API Client -->
    <script src="https://apis.google.com/js/api.js"></script>
</head>
<body>
<div class="container">
    <div id="authPanel" class="panel">
        <h2>🎮 Гипер-крестики-нолики</h2>
        <p style="color: #666;">Синхронизация через Google Диск</p>
        <button id="authBtn">🔐 Войти через Google</button>
        <div style="margin-top: 20px; font-size: 0.8em; color: #999;">Потребуется доступ к Google Диску для хранения игры</div>
    </div>
    
    <div id="gameBox" class="game-box" style="display: none">
        <div class="status" id="statusMsg">Загрузка...</div>
        <div class="scores">
            <div class="score score-x"><span>❌ X</span><span id="scoreX">0</span></div>
            <div class="score score-o"><span>⭕ O</span><span id="scoreO">0</span></div>
        </div>
        <div class="big-board" id="bigBoard"></div>
        <div class="turn-hint" id="turnHint"></div>
        <button id="resetBtn">🔄 Новая игра</button>
        <div class="drive-status" id="driveStatus"></div>
    </div>
</div>

<script>
    // CLIENT ID — нужно создать в Google Cloud Console
    // ВАЖНО: замените на свой Client ID
    const CLIENT_ID = 'YOUR_CLIENT_ID.apps.googleusercontent.com';
    const API_KEY = 'YOUR_API_KEY';
    const SCOPES = 'https://www.googleapis.com/auth/drive.file';
    const FILE_NAME = 'hyper_tic_tac_toe_save.json';
    
    let tokenClient;
    let gapiInited = false;
    let gisInited = false;
    let fileId = null;
    let localPlayer = null;
    
    // Игровое состояние
    let gameState = {
        smallGrid: Array(9).fill().map(() => Array(9).fill(null)),
        bigWinner: Array(9).fill(null),
        bigLocked: Array(9).fill(false),
        scores: [0, 0],
        currentPlayer: 0,
        nextBig: null,
        gameWinner: null,
        lastMoveBy: null,
        lastUpdate: 0
    };
    
    const winLines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    const gridNames = ['ЮЗ', 'Ю', 'ЮВ', 'З', 'Ц', 'В', 'СЗ', 'С', 'СВ'];
    
    function checkAndSetWin(bigIdx) {
        if (gameState.bigLocked[bigIdx]) return gameState.bigWinner[bigIdx];
        const grid = gameState.smallGrid[bigIdx];
        for (let line of winLines) {
            const [a,b,c] = line;
            if (grid[a] && grid[a] === grid[b] && grid[a] === grid[c]) {
                gameState.bigWinner[bigIdx] = grid[a];
                gameState.bigLocked[bigIdx] = true;
                if (grid[a] === 'X') gameState.scores[0]++;
                else gameState.scores[1]++;
                return grid[a];
            }
        }
        return null;
    }
    
    function updateGame() {
        for (let i = 0; i < 9; i++) if (!gameState.bigLocked[i]) checkAndSetWin(i);
        gameState.gameWinner = null;
        if (gameState.scores[0] >= 5) gameState.gameWinner = 'X';
        else if (gameState.scores[1] >= 5) gameState.gameWinner = 'O';
        if (!gameState.gameWinner) {
            for (let line of winLines) {
                const [a,b,c] = line;
                if (gameState.bigWinner[a] && gameState.bigWinner[a] === gameState.bigWinner[b] && gameState.bigWinner[a] === gameState.bigWinner[c]) {
                    gameState.gameWinner = gameState.bigWinner[a];
                    break;
                }
            }
        }
    }
    
    function makeMove(bigIdx, smallIdx) {
        if (gameState.gameWinner) { alert(`Игра окончена! Победил ${gameState.gameWinner}`); return; }
        if (!localPlayer) { alert("Выберите, за кого играете (X или O)"); return; }
        const myTurn = (localPlayer === 'X' && gameState.currentPlayer === 0) || (localPlayer === 'O' && gameState.currentPlayer === 1);
        if (!myTurn) { alert("Сейчас не ваш ход"); return; }
        if (gameState.nextBig !== null && bigIdx !== gameState.nextBig) { alert(`Ходите в квадрат ${gridNames[gameState.nextBig]}`); return; }
        if (gameState.smallGrid[bigIdx][smallIdx] !== null) { alert("Клетка занята"); return; }
        
        gameState.smallGrid[bigIdx][smallIdx] = localPlayer;
        checkAndSetWin(bigIdx);
        updateGame();
        gameState.nextBig = smallIdx;
        gameState.currentPlayer = 1 - gameState.currentPlayer;
        gameState.lastMoveBy = localPlayer;
        gameState.lastUpdate = Date.now();
        
        saveToDrive();
        render();
    }
    
    async function saveToDrive() {
        if (!fileId) return;
        const content = JSON.stringify(gameState);
        const response = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
            method: 'PATCH',
            headers: {
                'Authorization': `Bearer ${tokenClient.credentials.access_token}`,
                'Content-Type': 'application/json'
            },
            body: content
        });
        if (response.ok) {
            document.getElementById('driveStatus').innerHTML = '✓ Сохранено в Google Диск';
            setTimeout(() => document.getElementById('driveStatus').innerHTML = '', 2000);
        }
    }
    
    async function loadFromDrive() {
        if (!fileId) return;
        const response = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
            headers: { 'Authorization': `Bearer ${tokenClient.credentials.access_token}` }
        });
        if (response.ok) {
            const data = await response.json();
            if (data && data.lastUpdate > gameState.lastUpdate) {
                gameState = data;
                render();
            }
        }
    }
    
    async function findOrCreateFile() {
        // Ищем файл
        const searchResponse = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${FILE_NAME}'&fields=files(id,name)`, {
            headers: { 'Authorization': `Bearer ${tokenClient.credentials.access_token}` }
        });
        const searchResult = await searchResponse.json();
        
        if (searchResult.files && searchResult.files.length > 0) {
            fileId = searchResult.files[0].id;
            await loadFromDrive();
        } else {
            // Создаём новый файл
            const createResponse = await fetch('https://www.googleapis.com/drive/v3/files', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${tokenClient.credentials.access_token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ name: FILE_NAME, mimeType: 'application/json' })
            });
            const newFile = await createResponse.json();
            fileId = newFile.id;
            
            // Инициализируем начальное состояние
            gameState = {
                smallGrid: Array(9).fill().map(() => Array(9).fill(null)),
                bigWinner: Array(9).fill(null),
                bigLocked: Array(9).fill(false),
                scores: [0, 0],
                currentPlayer: 0,
                nextBig: null,
                gameWinner: null,
                lastMoveBy: null,
                lastUpdate: Date.now()
            };
            await saveToDrive();
        }
        render();
    }
    
    function render() {
        const boardDiv = document.getElementById('bigBoard');
        boardDiv.innerHTML = '';
        const myTurn = localPlayer && ((localPlayer === 'X' && gameState.currentPlayer === 0) || (localPlayer === 'O' && gameState.currentPlayer === 1));
        
        for (let big = 0; big < 9; big++) {
            const bigDiv = document.createElement('div');
            bigDiv.className = 'big-cell';
            if (gameState.bigWinner[big]) {
                bigDiv.classList.add('won');
                bigDiv.setAttribute('data-winner', gameState.bigWinner[big]);
            }
            if (!gameState.gameWinner && gameState.nextBig !== null && gameState.nextBig === big && myTurn) bigDiv.classList.add('highlight');
            
            const smallDiv = document.createElement('div'); smallDiv.className = 'small-board';
            for (let small = 0; small < 9; small++) {
                const cell = document.createElement('div'); cell.className = 'cell';
                const val = gameState.smallGrid[big]?.[small];
                if (val) {
                    cell.classList.add('taken', val === 'X' ? 'x' : 'o');
                    cell.textContent = val;
                } else {
                    cell.textContent = '';
                    if (!gameState.gameWinner && myTurn && (gameState.nextBig === null || big === gameState.nextBig)) {
                        cell.onclick = (() => makeMove(big, small));
                    }
                }
                smallDiv.appendChild(cell);
            }
            bigDiv.appendChild(smallDiv);
            boardDiv.appendChild(bigDiv);
        }
        
        document.getElementById('scoreX').textContent = gameState.scores[0];
        document.getElementById('scoreO').textContent = gameState.scores[1];
        
        const statusDiv = document.getElementById('statusMsg');
        if (gameState.gameWinner) statusDiv.innerHTML = `🏆 ПОБЕДИЛ ${gameState.gameWinner}`;
        else if (!localPlayer) statusDiv.innerHTML = 'Выберите X или O (кнопка ниже)';
        else if (myTurn) {
            if (gameState.nextBig === null) statusDiv.innerHTML = `Ваш ход (${localPlayer}) — ЛЮБОЙ квадрат`;
            else statusDiv.innerHTML = `Ваш ход (${localPlayer}) — зелёный квадрат ${gridNames[gameState.nextBig]}`;
        } else statusDiv.innerHTML = `Ход соперника... (${gameState.currentPlayer === 0 ? 'X' : 'O'})`;
        
        const hintDiv = document.getElementById('turnHint');
        hintDiv.innerHTML = (!gameState.gameWinner && localPlayer && gameState.nextBig !== null) ? `Следующий квадрат: ${gridNames[gameState.nextBig]}` : '';
    }
    
    function setPlayer(player) {
        localPlayer = player;
        render();
    }
    
    function resetGame() {
        gameState = {
            smallGrid: Array(9).fill().map(() => Array(9).fill(null)),
            bigWinner: Array(9).fill(null),
            bigLocked: Array(9).fill(false),
            scores: [0, 0],
            currentPlayer: 0,
            nextBig: null,
            gameWinner: null,
            lastMoveBy: null,
            lastUpdate: Date.now()
        };
        saveToDrive();
        render();
    }
    
    function startPolling() {
        setInterval(async () => {
            if (fileId && tokenClient) {
                await loadFromDrive();
            }
        }, 3000); // проверяем изменения каждые 3 секунды
    }
    
    function initGapi() {
        gapi.load('client', async () => {
            await gapi.client.init({
                apiKey: API_KEY,
                discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']
            });
            gapiInited = true;
        });
    }
    
    function initGis() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: SCOPES,
            callback: async (resp) => {
                if (resp.error) throw resp;
                await findOrCreateFile();
                document.getElementById('authPanel').style.display = 'none';
                document.getElementById('gameBox').style.display = 'block';
                startPolling();
                
                // Добавляем кнопки выбора игрока
                const playerPanel = document.createElement('div');
                playerPanel.style.display = 'flex';
                playerPanel.style.gap = '10px';
                playerPanel.style.margin = '10px 0';
                playerPanel.innerHTML = `
                    <button id="chooseX" style="margin:0; flex:1">❌ Играть за X</button>
                    <button id="chooseO" style="margin:0; flex:1">⭕ Играть за O</button>
                `;
                document.getElementById('gameBox').insertBefore(playerPanel, document.getElementById('bigBoard'));
                document.getElementById('chooseX').onclick = () => setPlayer('X');
                document.getElementById('chooseO').onclick = () => setPlayer('O');
            },
        });
        gisInited = true;
    }
    
    document.getElementById('authBtn').onclick = () => {
        if (!gapiInited || !gisInited) {
            alert('Загрузка API, попробуйте ещё раз через секунду');
            return;
        }
        tokenClient.requestAccessToken({ prompt: 'consent' });
    };
    
    document.getElementById('resetBtn').onclick = resetGame;
    
    // Загружаем API
    initGapi();
    initGis();
</script>
</body>
</html>
